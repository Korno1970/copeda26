<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>COPEDA 2026 — Admin SK</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --noir: #031D1E; --vert: #00484C; --mint: #3FE498;
  --blanc: #F5F7F5; --gris: #5A7070; --dim: #0A2C2E;
  --danger: #FF4D4D; --warn: #F5A623;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:var(--noir); color:var(--blanc); font-family:'DM Sans',sans-serif; }

/* ── LOGIN ── */
#login { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.2rem; background:var(--noir); z-index:99; }
.login-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:2.8rem; color:var(--mint); letter-spacing:.1em; }
.login-sub { font-size:.7rem; letter-spacing:.3em; text-transform:uppercase; color:var(--gris); }
.login-row { display:flex; gap:.6rem; }
.login-row input { background:var(--dim); border:1.5px solid var(--vert); border-radius:10px; padding:.75rem 1rem; color:var(--blanc); font-size:.95rem; outline:none; width:180px; }
.login-row input:focus { border-color:var(--mint); }
.login-row button { background:var(--mint); border:none; border-radius:10px; padding:.75rem 1.4rem; color:var(--noir); font-family:'Syne',sans-serif; font-weight:700; cursor:pointer; }
.login-err { color:var(--danger); font-size:.82rem; display:none; }

/* ── APP ── */
#app { display:none; height:100vh; grid-template-columns:260px 1fr 220px; grid-template-rows:52px 1fr; }
#app.on { display:grid; }

/* ── TOPBAR ── */
.topbar {
  grid-column:1/-1; background:var(--dim); border-bottom:1px solid var(--vert);
  display:flex; align-items:center; justify-content:space-between; padding:0 1.2rem;
}
.topbar-left { display:flex; align-items:center; gap:1rem; }
.topbar-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1rem; color:var(--mint); letter-spacing:.1em; }
.topbar-fb { display:flex; align-items:center; gap:.4rem; font-size:.72rem; color:var(--gris); }
.fb-dot { width:7px; height:7px; border-radius:50%; background:var(--mint); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.timer-display { font-family:'DM Mono',monospace; font-size:1.3rem; color:var(--blanc); }
.topbar-right { display:flex; gap:.5rem; }
.btn-xs { background:transparent; border:1px solid var(--vert); border-radius:8px; padding:.35rem .8rem; color:var(--gris); font-size:.72rem; cursor:pointer; transition:all .15s; white-space:nowrap; }
.btn-xs:hover { border-color:var(--mint); color:var(--mint); }
.btn-xs.danger { border-color:rgba(255,77,77,.4); color:var(--danger); }
.btn-xs.danger:hover { background:rgba(255,77,77,.1); }

/* ── SIDEBAR GAUCHE — Programme ── */
.col-left { background:var(--dim); border-right:1px solid var(--vert); display:flex; flex-direction:column; overflow:hidden; }
.col-title { padding:.8rem 1rem; font-size:.62rem; letter-spacing:.25em; text-transform:uppercase; color:var(--gris); border-bottom:1px solid var(--vert); display:flex; justify-content:space-between; align-items:center; }
.col-title span { color:var(--mint); font-family:'DM Mono',monospace; font-size:.8rem; }
.ep-list { flex:1; overflow-y:auto; }
.ep-item { padding:.7rem 1rem; display:flex; align-items:center; gap:.6rem; cursor:pointer; border-left:3px solid transparent; transition:all .15s; }
.ep-item:hover { background:rgba(63,228,152,.04); }
.ep-item.active { background:rgba(63,228,152,.07); border-left-color:var(--mint); }
.ep-item.done { opacity:.5; }
.ep-n { font-family:'DM Mono',monospace; font-size:.68rem; color:var(--gris); min-width:20px; }
.ep-info { flex:1; min-width:0; }
.ep-name { font-size:.82rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ep-desc { font-size:.62rem; color:var(--gris); margin-top:.15rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ep-lettre { font-family:'Syne',sans-serif; font-weight:800; font-size:.95rem; color:var(--mint); flex-shrink:0; }

/* ── PANNEAU CENTRAL ── */
.col-main { display:flex; flex-direction:column; overflow:hidden; }

.panel-head {
  padding:.9rem 1.2rem; border-bottom:1px solid var(--vert);
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.panel-ep-tag { font-size:.62rem; letter-spacing:.2em; text-transform:uppercase; color:var(--mint); margin-bottom:.2rem; }
.panel-ep-name { font-family:'Syne',sans-serif; font-weight:800; font-size:1.3rem; }

.panel-body { flex:1; overflow-y:auto; padding:1rem 1.2rem; display:flex; flex-direction:column; gap:.9rem; }

/* Titre actif */
.current-item {
  background:rgba(63,228,152,.06); border:1px solid rgba(63,228,152,.25);
  border-radius:12px; padding:.9rem 1.1rem;
  display:flex; align-items:center; gap:.8rem;
}
.ci-num { font-family:'DM Mono',monospace; font-size:.7rem; color:var(--gris); min-width:28px; }
.ci-info { flex:1; }
.ci-title { font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; }
.ci-sub { font-size:.75rem; color:var(--gris); margin-top:.15rem; }
.ci-status { font-size:1.1rem; }

/* Bouton principal */
.btn-main {
  width:100%; padding:1rem; border:none; border-radius:12px;
  font-family:'Syne',sans-serif; font-weight:800; font-size:1rem;
  cursor:pointer; transition:all .15s; letter-spacing:.05em;
}
.btn-main.go { background:var(--mint); color:var(--noir); }
.btn-main.go:hover { opacity:.9; transform:translateY(-1px); }
.btn-main.next { background:var(--vert); color:var(--blanc); }
.btn-main.next:hover { background:#005a5f; }
.btn-main.stop { background:rgba(255,77,77,.15); color:var(--danger); border:1px solid rgba(255,77,77,.3); }

/* Buzz zone */
.buzz-zone {
  background:var(--dim); border:1px solid var(--vert); border-radius:12px; padding:1rem;
  transition:border-color .2s;
}
.buzz-zone.lit { border-color:var(--mint); background:rgba(63,228,152,.04); }
.buzz-header { font-size:.62rem; letter-spacing:.2em; text-transform:uppercase; color:var(--gris); margin-bottom:.6rem; }
.buzz-row { display:flex; align-items:center; gap:.8rem; }
.buzz-badge {
  width:44px; height:44px; border-radius:9px; background:var(--vert);
  display:flex; align-items:center; justify-content:center;
  font-family:'Syne',sans-serif; font-weight:800; font-size:.95rem; color:var(--mint);
  transition:all .2s; flex-shrink:0;
}
.buzz-badge.lit { background:var(--mint); color:var(--noir); }
.buzz-info { flex:1; }
.buzz-team { font-family:'Syne',sans-serif; font-weight:700; font-size:.95rem; }
.buzz-rep { font-size:.8rem; color:var(--gris); margin-top:.1rem; min-height:1.1em; }
.verdict-row { display:flex; gap:.6rem; margin-top:.8rem; }
.btn-verdict {
  flex:1; padding:.7rem; border:none; border-radius:10px;
  font-family:'Syne',sans-serif; font-weight:700; font-size:.85rem;
  cursor:pointer; transition:all .15s;
}
.btn-verdict.ok { background:rgba(63,228,152,.15); color:var(--mint); border:1px solid rgba(63,228,152,.3); }
.btn-verdict.ok:hover { background:rgba(63,228,152,.25); }
.btn-verdict.ko { background:rgba(255,77,77,.1); color:var(--danger); border:1px solid rgba(255,77,77,.25); }
.btn-verdict.ko:hover { background:rgba(255,77,77,.2); }

/* Track list */
.track-list { display:flex; flex-direction:column; gap:.25rem; max-height:240px; overflow-y:auto; }
.track-list::-webkit-scrollbar { width:3px; }
.track-list::-webkit-scrollbar-thumb { background:var(--vert); border-radius:2px; }
.t-item { display:flex; align-items:center; gap:.6rem; padding:.5rem .7rem; border-radius:8px; cursor:pointer; transition:background .1s; border:1px solid transparent; }
.t-item:hover { background:rgba(63,228,152,.04); }
.t-item.sel { background:rgba(63,228,152,.08); border-color:rgba(63,228,152,.2); }
.t-item.played { opacity:.4; }
.t-n { font-family:'DM Mono',monospace; font-size:.65rem; color:var(--gris); min-width:20px; }
.t-title { font-size:.8rem; font-weight:500; flex:1; }
.t-artist { font-size:.7rem; color:var(--gris); }

/* Physique */
.physique-zone { background:var(--dim); border:1px solid var(--vert); border-radius:12px; padding:1.8rem; text-align:center; }
.physique-icon { font-size:2.2rem; margin-bottom:.6rem; }
.physique-desc { font-size:.85rem; color:var(--gris); line-height:1.7; }

/* Reco image preview */
.reco-preview {
  background:var(--dim); border:1px solid var(--vert); border-radius:12px;
  overflow:hidden; aspect-ratio:4/3; display:flex; align-items:center; justify-content:center;
}
.reco-preview img { width:100%; height:100%; object-fit:cover; }
.reco-answer-expected { font-size:.78rem; color:var(--gris); padding:.5rem .2rem; }

/* ── SIDEBAR DROITE — Scores ── */
.col-right { background:var(--dim); border-left:1px solid var(--vert); display:flex; flex-direction:column; overflow:hidden; }
.scores-wrap { flex:1; overflow-y:auto; padding:.75rem; display:flex; flex-direction:column; gap:.6rem; }
.score-card { background:var(--noir); border:1px solid var(--vert); border-radius:10px; padding:.8rem; }
.score-card.leader { border-color:var(--mint); }
.sc-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:.5rem; }
.sc-name { font-family:'Syne',sans-serif; font-weight:700; font-size:.85rem; }
.sc-count { font-family:'DM Mono',monospace; font-size:.68rem; color:var(--gris); }
.sc-chips { display:flex; gap:.2rem; flex-wrap:wrap; margin-bottom:.5rem; }
.sc-chip { width:22px; height:22px; border-radius:4px; background:var(--vert); display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:800; font-size:.65rem; color:var(--gris); }
.sc-chip.lit { background:var(--mint); color:var(--noir); }
.attrib-row { display:flex; gap:.2rem; flex-wrap:wrap; }
.btn-attrib { padding:.15rem .4rem; border-radius:4px; border:1px solid var(--vert); background:transparent; color:var(--gris); font-family:'DM Mono',monospace; font-size:.58rem; cursor:pointer; transition:all .1s; }
.btn-attrib:hover { border-color:var(--mint); color:var(--mint); }

/* Toast */
.emineo-wrap { display:flex; flex-direction:column; gap:.8rem; }
.emineo-chrono-bar { display:flex; align-items:center; gap:.8rem; background:var(--dim); border:1px solid var(--vert); border-radius:12px; padding:.8rem 1rem; }
.emineo-timer { font-family:'DM Mono',monospace; font-size:2rem; color:var(--mint); letter-spacing:.1em; flex:1; }
.emineo-grid { display:grid; grid-template-columns:70px repeat(5,1fr); gap:.3rem; }
.eg-head { font-family:'DM Mono',monospace; font-size:.65rem; letter-spacing:.15em; text-transform:uppercase; color:var(--mint); text-align:center; padding:.4rem .2rem; background:rgba(63,228,152,.06); border-radius:6px; }
.eg-group { font-family:'Syne',sans-serif; font-weight:700; font-size:.82rem; color:var(--blanc); display:flex; align-items:center; justify-content:center; }
.eg-cell { aspect-ratio:1; border-radius:8px; border:1px solid var(--vert); overflow:hidden; background:var(--dim); display:flex; align-items:center; justify-content:center; transition:border-color .2s; }
.eg-cell img { width:100%; height:100%; object-fit:cover; }
.eg-cell.empty { color:var(--gris); font-size:.65rem; font-family:'DM Mono',monospace; }
.eg-cell.validated { border-color:var(--mint); border-width:2px; }
.toast { position:fixed; bottom:1.2rem; left:50%; transform:translateX(-50%) translateY(10px); background:var(--vert); border:1px solid var(--mint); border-radius:10px; padding:.6rem 1.2rem; font-size:.82rem; color:var(--mint); font-family:'Syne',sans-serif; font-weight:600; opacity:0; transition:all .25s; z-index:500; white-space:nowrap; pointer-events:none; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>

function login() {

    document.getElementById('app').classList.add('on');
    init();

function init() {
  get(ref(db,'config/mot')).then(s => { if(!s.exists()) set(ref(db,'config/mot'), MOT); });

// ── PROGRAMME ──
function buildEpList() {
  const list = document.getElementById('ep-list');
  list.innerHTML = '';
  EPREUVES.forEach((ep, i) => {
    const d = document.createElement('div');
    d.className = 'ep-item';
    d.innerHTML = `
      <span class="ep-n">${i+1}</span>
      <div class="ep-info">
        <div class="ep-name">${ep.titre}</div>
        <div class="ep-desc">${ep.desc}</div>
      </div>`;
    d.addEventListener('click', () => selectEp(i));
    list.appendChild(d);
  });
}

function selectEp(i) {
  if(epIdx >= 0 && i !== epIdx && Object.values(epScores).some(p => p > 0)) {
    attribuerLettreEpreuve();
  }
  epIdx = i; trackIdx = 0; playedTracks = new Set();
  document.querySelectorAll('.ep-item').forEach((el,j) => el.classList.toggle('active', j===i));
  const ep = EPREUVES[i];
  document.getElementById('panel-tag').textContent = ep.label;
  document.getElementById('panel-name').textContent = ep.titre;
  document.getElementById('ep-counter').textContent = (i+1) + '/6';
  // Pousser immédiatement dans Firebase pour que index.html bascule
  set(ref(db,'game/epreuve'), { 
    id:ep.id, statut:'attente', label:ep.label, titre:ep.titre,
    lettre:MOT[ep.lettre], lettre_idx:ep.lettre,
    titre_attente: ep.titre + ' — préparez-vous !'
  });
  set(ref(db,'game/buzz'), { team:null, ts:null });
  renderPanel(ep);
}

    document.getElementById('btn-launch').addEventListener('click', () => {

    ['g1','g2','g3'].forEach((g,i) => {
      document.getElementById('btn-phys-'+g).addEventListener('click', () => {

// ── VERDICT ──
function verdictOk() {
  const ep = EPREUVES[epIdx];
  if(!ep) return;
  const team = buzzTeam || lastRecoTeam;
  if(!team) { toast('⚠️ Aucune équipe identifiée'); return; }

  // Ajouter des points à l'équipe pour CETTE épreuve (pas une lettre)
  const teamKey = 'G' + team;
  const pts = ep.type === 'blindtest' ? 1 : 1; // 1pt par bonne réponse (scoring titre+artiste géré côté index)
  const curPts = epScores[teamKey] || 0;
  epScores[teamKey] = curPts + pts;
  set(ref(db,'game/ep_scores/' + teamKey), epScores[teamKey]);

  set(ref(db,'game/resultat'), { team, correct:true, lettre: MOT[ep.lettre], lettre_idx: ep.lettre, ts:Date.now() });
  set(ref(db,'game/buzz'), { team:null, ts:null });
  const vrow = document.getElementById('verdict-row');
  if(vrow) { vrow.style.display = 'none'; }
  const zbadge = document.getElementById('buzz-badge');
  const zteam = document.getElementById('buzz-team');
  const zrep = document.getElementById('buzz-rep');
  if(zbadge) { zbadge.textContent = '—'; zbadge.className = 'buzz-badge'; }
  if(zteam) zteam.textContent = 'En attente…';
  if(zrep) zrep.textContent = '—';
  toast('✓ +1pt → G' + team + ' (' + epScores[teamKey] + ' pts)');
  buzzTeam = null; lastRecoTeam = null;


  // Passage automatique au titre/image suivant après bonne réponse
  const ep2 = EPREUVES[epIdx];
  if(ep2?.type === 'blindtest') {
    playedTracks.add(trackIdx);
    trackIdx = Math.min(trackIdx+1, ep2.tracks.length-1);
    updateCurrentItem(ep2);
    activerTitre(ep2);
  } else if(ep2?.type === 'reconnaissance') {
    playedTracks.add(trackIdx);
    trackIdx = Math.min(trackIdx+1, ep2.tracks.length-1);
    renderRecoPanel(ep2);
    activerRecoAuto(ep2);
  }
}

function attribuerLettreEpreuve() {
  const ep = EPREUVES[epIdx];
  if(!ep) return;
  const lettre_idx = ep.lettre;
  const best = ['G1','G2','G3'].reduce((a, b) =>
    (epScores[a]||0) >= (epScores[b]||0) ? a : b
  );
  if((epScores[best]||0) === 0) { toast('Aucun point marqué — pas de lettre attribuée'); return; }
  const cur = scores[best] || [];
  if(!cur.includes(lettre_idx)) {
    const updated = [...cur, lettre_idx];
    set(ref(db,'game/scores/' + best + '/lettres'), updated);
    scores[best] = updated;
    buildScores();
  }
  toast('🏆 Lettre ' + MOT[lettre_idx] + ' → ' + best);
  // Les points NE se remettent PAS à zéro — ils sont cumulatifs
}

function verdictKo() {
  if(!buzzTeam) return;
  // Mauvaise réponse — on réarme le buzzer pour TOUT le monde, on continue
  set(ref(db,'game/resultat'), { team:buzzTeam, correct:false, ts:Date.now() });
  set(ref(db,'game/buzz'), { team:null, ts:null });
  document.getElementById('verdict-row').style.display = 'none';
  resetBuzzUI();
  toast('✗ Mauvaise réponse — buzzer réarmé');
  buzzTeam = null;
  // On NE passe PAS au suivant — on attend qu'une équipe ait juste
}

function resetBuzzUI() {
  const badge = document.getElementById('buzz-badge');
  const team = document.getElementById('buzz-team');
  const rep = document.getElementById('buzz-rep');
  const zone = document.getElementById('buzz-zone');
  if(badge) { badge.textContent = '—'; badge.className = 'buzz-badge'; }
  if(team) team.textContent = 'En attente…';
  if(rep) rep.textContent = "Personne n'a encore buzzé";
  if(zone) zone.classList.remove('lit');
}

function setAttente(msg) {
  set(ref(db,'game/epreuve'), { statut:'attente', titre_attente:msg });
}

// ── FIREBASE LISTEN ──
function listenFB() {
  onValue(ref(db,'game/buzz'), snap => {
    const d = snap.val();
    if(!d?.team) { resetBuzzUI(); return; }
    buzzTeam = d.team;
    const badge = document.getElementById('buzz-badge');
    const team = document.getElementById('buzz-team');
    const zone = document.getElementById('buzz-zone');
    const vrow = document.getElementById('verdict-row');
    if(badge) { badge.textContent = 'G'+d.team; badge.className = 'buzz-badge lit'; }
    if(team) team.textContent = 'G'+d.team+' a buzzé !';
    if(zone) zone.classList.add('lit');
    if(vrow) vrow.style.display = 'flex';
  });

  onValue(ref(db,'game/reco_reponses'), snap => {
    const d = snap.val();
    if(!d || epIdx < 0 || EPREUVES[epIdx]?.type !== 'reconnaissance') return;
    const cur = EPREUVES[epIdx].tracks[trackIdx];
    const items = Object.values(d).filter(r => r.fichier === cur?.fichier);
    if(!items.length) return;
    const last = items.sort((a,b) => b.ts-a.ts)[0];
    lastRecoTeam = last.team;
    const rep = document.getElementById('buzz-rep');
    const team = document.getElementById('buzz-team');
    const badge = document.getElementById('buzz-badge');
    const zone = document.getElementById('buzz-zone');
    if(rep) rep.textContent = `"${last.rep1}${last.rep2?' / '+last.rep2:''}" — ${last.points}pt(s)`;
    if(team) team.textContent = 'G'+last.team+' a répondu';
    if(badge) { badge.textContent = 'G'+last.team; badge.className = 'buzz-badge lit'; }
    if(zone) zone.classList.add('lit');
  });

  onValue(ref(db,'game/ep_scores'), snap => {
    const d = snap.val() || {};
    ['G1','G2','G3'].forEach(t => { epScores[t] = d[t] || 0; });
    buildScores();
  
  });

  onValue(ref(db,'game/scores'), snap => {
    const d = snap.val() || {};
    ['G1','G2','G3'].forEach(t => { scores[t] = d[t]?.lettres || []; });
  });

  onValue(ref(db,'game/gagnant'), snap => {
    const d = snap.val();
    if(d?.team) toast('🏆 G'+d.team+' a trouvé le mot mystère !');
  });
}

// ── COLONNE DROITE — scores + buzz + attribuer ──
function buildRightPanel(ep) {
  const old = document.getElementById('right-buzz-zone');
  if(old) old.remove();
  buildScores();
  const wrap = document.getElementById('scores-wrap');
  const buzzDiv = document.createElement('div');
  buzzDiv.id = 'right-buzz-zone';
  buzzDiv.innerHTML = `
    <div style="margin-top:.8rem;border-top:1px solid var(--vert);padding-top:.8rem;display:flex;flex-direction:column;gap:.4rem;">
      <div style="font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gris);">Buzz</div>
      <div style="display:flex;align-items:center;gap:.4rem;">
        <div class="buzz-badge" id="buzz-badge">—</div>
        <div id="buzz-team" style="font-size:.78rem;color:var(--blanc);">En attente…</div>
      </div>
      <div id="buzz-rep" style="font-size:.7rem;color:var(--gris);min-height:1rem;">—</div>
      <div style="display:flex;gap:.3rem;">
        <button class="btn-sm" onclick="forceTeam(1)">G1</button>
        <button class="btn-sm" onclick="forceTeam(2)">G2</button>
        <button class="btn-sm" onclick="forceTeam(3)">G3</button>
      </div>
      <div class="verdict-row" id="verdict-row" style="display:none;flex-direction:column;gap:.3rem;">
        <button class="btn-verdict ok" id="btn-ok">✓ Correct — +1pt</button>
        <button class="btn-verdict ko" id="btn-ko">✗ Incorrect</button>
      </div>
      <button class="btn-main stop" id="btn-attribuer" style="margin-top:.3rem;font-size:.72rem;padding:.5rem;">
        🏆 Attribuer la lettre
      </button>
    </div>`;
  wrap.appendChild(buzzDiv);
  attachBuzzHandlers();
}

// ── SCORES — colonne droite, points cumulatifs uniquement ──
function buildScores() {
  const wrap = document.getElementById('scores-wrap');
  const buzzZone = document.getElementById('right-buzz-zone');
  wrap.innerHTML = '';
  const max = Math.max(0, ...['G1','G2','G3'].map(t => epScores[t]||0));
  ['G1','G2','G3'].forEach(team => {
    const pts = epScores[team] || 0;
    const d = document.createElement('div');
    d.className = 'score-card' + (pts > 0 && pts === max ? ' leader' : '');
    d.innerHTML = `
      <div class="sc-top">
        <span class="sc-name">${team}</span>
        <span class="sc-count" style="font-size:1.3rem;color:var(--mint);font-family:'DM Mono',monospace;font-weight:700;">${pts}</span>
      </div>`;
    wrap.appendChild(d);
  });
  if(buzzZone) wrap.appendChild(buzzZone);
}

function attributeAll(idx) {
  ['G1','G2','G3'].forEach(t => {
    const cur = scores[t] || [];
    if(!cur.includes(idx)) {
      const upd = [...cur, idx];
      set(ref(db,'game/scores/'+t+'/lettres'), upd);
      scores[t] = upd;
    }
  });
  buildScores();
}

// ── TIMER ──
document.getElementById('btn-timer-start').addEventListener('click', () => {
  if(timerOn) return;
  timerOn = true;
  const startTs = Date.now();
  set(ref(db,'game/timer'), { running:true, start:startTs, duration:600 });
  timerInt = setInterval(() => {
    timerSec++;
    const m = Math.floor(timerSec/60), s = timerSec%60;
    document.getElementById('timer').textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  }, 1000);
});
document.getElementById('btn-timer-stop').addEventListener('click', () => {
  clearInterval(timerInt); timerOn = false; timerSec = 0;
  document.getElementById('timer').textContent = '00:00';
  set(ref(db,'game/timer'), { running:false });
});

// ── PAUSE ──
document.getElementById('btn-pause').addEventListener('click', () => {
  setAttente('Pause — prochaine épreuve dans un instant');
  toast('Mise en pause');
});

// ── RESET ──
document.getElementById('btn-reset').addEventListener('click', () => {
  if(!confirm('Réinitialiser toute la partie ?')) return;
  // Effacer tout d'un coup via l'API REST Firebase
  Promise.all([
    set(ref(db,'game'), null),
    set(ref(db,'emineo'), null),
    set(ref(db,'game/ep_scores'), null),
  ]).then(() => {
    scores = { G1:[], G2:[], G3:[] };
    epScores = { G1:0, G2:0, G3:0 };
    emPhotos = { G1:{}, G2:{}, G3:{} };
    ["G1","G2","G3"].forEach(g => { ["E","M","I","N","O"].forEach(l => { const c = document.getElementById("em-"+g+"-"+l); if(c){c.innerHTML="·";c.className="eg-cell empty";} }); });
    buildScores();
    // Remettre l'état initial APRÈS l'effacement
    setTimeout(() => {
      set(ref(db,'config/mot'), MOT);
      set(ref(db,'game/epreuve'), { statut:'attente', titre_attente:'Le jeu commence bientôt !' });
    }, 500);
    toast('Reset effectué');
  });
});

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}
</script>
</body>
</html>
