<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#031D1E">
<title>COPEDA 2026 — Projection</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --noir: #031D1E; --vert: #00484C; --mint: #3FE498;
  --blanc: #F5F7F5; --gris: #5A7070; --dim: #0A2C2E;
  --amber: #E8A020; --danger: #FF4D4D;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height:100%; width:100%;
  background:var(--noir);
  color:var(--blanc);
  font-family:'DM Sans', sans-serif;
  overflow:hidden;
}

/* ── LAYOUT ── */
#app {
  width:100vw; height:100vh;
  display:grid;
  grid-template-rows:64px 1fr 100px;
  grid-template-columns:1fr 280px;
  grid-template-areas:
    "topbar topbar"
    "main   scores"
    "bottom bottom";
}

/* ── TOPBAR ── */
.topbar {
  grid-area:topbar;
  background:var(--dim);
  border-bottom:1px solid var(--vert);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 2rem;
}
.topbar-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.1rem; color:var(--mint); letter-spacing:.1em; }
.topbar-ep { font-family:'DM Mono',monospace; font-size:.75rem; letter-spacing:.2em; text-transform:uppercase; color:var(--gris); }
.topbar-right { display:flex; align-items:center; gap:1.5rem; }
.fb-dot { width:8px; height:8px; border-radius:50%; background:var(--mint); animation:pulse 2s infinite; display:inline-block; margin-right:.4rem; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── ZONE PRINCIPALE ── */
.main-zone {
  grid-area:main;
  position:relative;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  background:var(--noir);
}

/* Attente */
.waiting {
  text-align:center;
  animation:fadeIn .5s ease;
}
.waiting-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(3rem,8vw,6rem); color:var(--mint); letter-spacing:.1em; line-height:1; margin-bottom:1rem; }
.waiting-sub { font-family:'DM Mono',monospace; font-size:.8rem; letter-spacing:.3em; text-transform:uppercase; color:var(--gris); }

/* Image plein écran */
.image-zone {
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  position:relative;
}
.image-zone img {
  max-width:100%; max-height:100%;
  object-fit:contain;
  display:block;
  animation:zoomIn .4s ease;
}
@keyframes zoomIn { from{opacity:0;transform:scale(.97)} to{opacity:1;transform:scale(1)} }

/* Reveal titre */
.reveal-overlay {
  position:absolute; inset:0;
  background:rgba(3,29,30,.92);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  animation:fadeIn .4s ease;
  gap:1rem;
}
.reveal-label { font-family:'DM Mono',monospace; font-size:.75rem; letter-spacing:.3em; text-transform:uppercase; color:var(--gris); }
.reveal-title { font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(2rem,6vw,5rem); color:var(--mint); text-align:center; letter-spacing:.05em; line-height:1.1; padding:0 2rem; }
.reveal-team { font-family:'DM Mono',monospace; font-size:1rem; color:var(--amber); letter-spacing:.15em; }

/* BT — titre actif */
.bt-zone {
  text-align:center; padding:2rem;
  animation:fadeIn .4s ease;
}
.bt-num { font-family:'DM Mono',monospace; font-size:.8rem; letter-spacing:.3em; text-transform:uppercase; color:var(--gris); margin-bottom:1rem; }
.bt-title { font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(2.5rem,7vw,5.5rem); color:var(--blanc); line-height:1; margin-bottom:.5rem; }
.bt-artist { font-family:'DM Sans',sans-serif; font-size:clamp(1.2rem,3vw,2.2rem); color:var(--mint); font-weight:300; }
.bt-hidden { filter:blur(20px); user-select:none; }

/* Buzz banner */
.buzz-banner {
  position:absolute; top:1.5rem; left:50%; transform:translateX(-50%);
  background:var(--mint); color:var(--noir);
  font-family:'Syne',sans-serif; font-weight:800;
  font-size:1.1rem; letter-spacing:.1em;
  padding:.6rem 2rem; border-radius:99px;
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap; z-index:10;
}
@keyframes popIn { 0%{transform:translateX(-50%) scale(0)} 100%{transform:translateX(-50%) scale(1)} }

/* ── SCORES ── */
.scores-zone {
  grid-area:scores;
  background:var(--dim);
  border-left:1px solid var(--vert);
  display:flex; flex-direction:column;
  padding:1rem .8rem;
  gap:.6rem;
  overflow:hidden;
}
.scores-title { font-family:'DM Mono',monospace; font-size:.6rem; letter-spacing:.25em; text-transform:uppercase; color:var(--gris); margin-bottom:.2rem; }
.score-row {
  flex:1;
  background:var(--noir); border:1px solid var(--vert); border-radius:10px;
  padding:.6rem .8rem;
  display:flex; align-items:center; justify-content:space-between;
  transition:border-color .3s;
}
.score-row.leader { border-color:var(--mint); }
.score-row.buzzed { border-color:var(--amber); background:rgba(232,160,32,.06); }
.sr-name { font-family:'Syne',sans-serif; font-weight:700; font-size:1.1rem; }
.sr-pts { font-family:'Syne',sans-serif; font-weight:800; font-size:2rem; color:var(--mint); line-height:1; }
.sr-pts-label { font-family:'DM Mono',monospace; font-size:.55rem; color:var(--gris); letter-spacing:.1em; text-transform:uppercase; text-align:right; }

/* ── BOTTOM BAR ── */
.bottom-bar {
  grid-area:bottom;
  background:var(--dim); border-top:1px solid var(--vert);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 2rem;
}
.timer-big { font-family:'DM Mono',monospace; font-size:2.5rem; font-weight:500; color:var(--blanc); letter-spacing:.1em; }
.timer-big.warn { color:var(--amber); }
.timer-big.danger { color:var(--danger); animation:blink .5s step-end infinite; }
@keyframes blink { 50%{opacity:0} }
.bottom-center { text-align:center; }
.bottom-ep-label { font-family:'DM Mono',monospace; font-size:.6rem; letter-spacing:.2em; text-transform:uppercase; color:var(--gris); }
.bottom-ep-name { font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; margin-top:.2rem; }
.bottom-right { font-family:'DM Mono',monospace; font-size:.65rem; color:var(--gris); text-align:right; line-height:1.8; }

/* ── EMINEO PHOTOS ── */
.emineo-zone {
  width:100%; height:100%;
  display:grid;
  grid-template-rows:auto 1fr 1fr 1fr;
  grid-template-columns:60px repeat(5, 1fr);
  gap:.4rem; padding:.8rem;
  overflow:hidden;
}
.emineo-header-empty { }
.emineo-col-header { font-family:'DM Mono',monospace; font-size:.7rem; color:var(--mint); text-align:center; letter-spacing:.2em; text-transform:uppercase; display:flex; align-items:center; justify-content:center; font-weight:700; }
.emineo-row-label { font-family:'Syne',sans-serif; font-weight:800; font-size:1rem; color:var(--mint); display:flex; align-items:center; justify-content:center; }
.emineo-cell { border-radius:6px; border:1px solid var(--vert); background:var(--dim); overflow:hidden; display:flex; align-items:center; justify-content:center; }
.emineo-cell img { width:100%; height:100%; object-fit:cover; }
.emineo-cell.empty { color:var(--gris); font-size:1.2rem; }

@keyframes fadeIn { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>

<div id="app">

  <header class="topbar">
    <div style="display:flex;align-items:center;gap:1.5rem;">
      <span class="topbar-logo">SÉMINAIRE</span>
      <span class="topbar-ep" id="topbar-ep">COPEDA 2026</span>
    </div>
    <div class="topbar-right">
      <span style="font-size:.75rem;color:var(--gris);"><span class="fb-dot"></span>Firebase</span>
    </div>
  </header>

  <main class="main-zone" id="main-zone">
    <div class="waiting">
      <div class="waiting-logo">SÉMINAIRE</div>
      <div class="waiting-sub">En attente du lancement…</div>
    </div>
  </main>

  <aside class="scores-zone" id="scores-zone">
    <div class="scores-title">Scores</div>
    <div class="score-row" id="score-G1">
      <div class="sr-name">G1</div>
      <div><div class="sr-pts" id="pts-G1">0</div><div class="sr-pts-label">pts</div></div>
    </div>
    <div class="score-row" id="score-G2">
      <div class="sr-name">G2</div>
      <div><div class="sr-pts" id="pts-G2">0</div><div class="sr-pts-label">pts</div></div>
    </div>
    <div class="score-row" id="score-G3">
      <div class="sr-name">G3</div>
      <div><div class="sr-pts" id="pts-G3">0</div><div class="sr-pts-label">pts</div></div>
    </div>
  </aside>

  <div class="bottom-bar">
    <div class="timer-big" id="timer-display">00:00</div>
    <div class="bottom-center">
      <div class="bottom-ep-label" id="bottom-label">—</div>
      <div class="bottom-ep-name" id="bottom-name">Prêt à démarrer</div>
    </div>
    <div class="bottom-right" id="bottom-right">COPEDA 2026<br>Nantes · Avril</div>
  </div>

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const IMAGES_URL = 'https://korno1970.github.io/copeda26/';

const FB = {
  apiKey: "AIzaSyDUxgdh0Q3kAKkOr9Pqxdlpg56mkNwE4lo",
  authDomain: "aperitif-copeda.firebaseapp.com",
  databaseURL: "https://aperitif-copeda-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "aperitif-copeda",
  storageBucket: "aperitif-copeda.firebasestorage.app",
  messagingSenderId: "177081288912",
  appId: "1:177081288912:web:bc53c0bfd5775dd30df6d5"
};

const db = getDatabase(initializeApp(FB));
const MOT = ['L','A','P','É','R','O'];

let scores = { G1:[], G2:[], G3:[] };
let currentEpreuve = null;
let buzzTeam = null;
let timerInt = null;
let timerSec = 0;
let revealTimeout = null;

// ── SCORES — polling REST toutes les 2s (contourne les problèmes WebSocket) ──
const ptsCourants = { G1:0, G2:0, G3:0 };

function renderPts() {
  const max = Math.max(0, ...Object.values(ptsCourants));
  ['G1','G2','G3'].forEach(g => {
    const el = document.getElementById('pts-' + g);
    const row = document.getElementById('score-' + g);
    if(el) el.textContent = ptsCourants[g];
    if(row) row.classList.toggle('leader', ptsCourants[g] > 0 && ptsCourants[g] === max);
  });
}

function pollScores() {
  fetch('https://aperitif-copeda-default-rtdb.europe-west1.firebasedatabase.app/game/ep_scores.json')
    .then(r => r.json())
    .then(d => {
      if(!d) return;
      let changed = false;
      ['G1','G2','G3'].forEach(g => {
        const val = d[g] || 0;
        if(ptsCourants[g] !== val) { ptsCourants[g] = val; changed = true; }
      });
      if(changed) renderPts();
    })
    .catch(() => {});
}

setInterval(pollScores, 2000);
pollScores(); // premier appel immédiat

function renderScores() {
  const vals = Object.values(scores).map(s => s.length);
  const max = vals.length ? Math.max(...vals) : 0;
  ['G1','G2','G3'].forEach(t => {
    const earned = scores[t] || [];
    const pts = document.getElementById('pts-' + t);
    const row = document.getElementById('score-' + t);
    if(pts) pts.textContent = earned.length;
    if(row) {
      row.classList.toggle('leader', earned.length > 0 && earned.length === max);
      row.classList.toggle('buzzed', t === 'G' + buzzTeam);
    }
  });
}

// ── ÉPREUVE ──
onValue(ref(db,'game/epreuve'), snap => {
  const d = snap.val();
  if(!d) { showWaiting(); return; }
  currentEpreuve = d;

  document.getElementById('topbar-ep').textContent = d.label || 'COPEDA 2026';
  document.getElementById('bottom-label').textContent = d.label || '—';
  document.getElementById('bottom-name').textContent = d.titre || '—';

  if(d.statut === 'attente') {
    showWaiting(d.titre_attente);
  } else if(d.statut === 'buzzer') {
    showBT(d);
  } else if(d.statut === 'reconnaissance' || d.statut === 'cinéma') {
    showImage(d);
  } else if(d.statut === 'emineo') {
    showEmineo();
  }
});

// ── BUZZ ──
onValue(ref(db,'game/buzz'), snap => {
  const d = snap.val();
  buzzTeam = d?.team || null;
  renderScores();
  const main = document.getElementById('main-zone');
  // Retirer ancien banner
  const old = main.querySelector('.buzz-banner');
  if(old) old.remove();
  if(buzzTeam) {
    const banner = document.createElement('div');
    banner.className = 'buzz-banner';
    banner.textContent = '⚡ G' + buzzTeam + ' a buzzé !';
    main.appendChild(banner);
  }
});

// ── RÉSULTAT ──
onValue(ref(db,'game/resultat'), snap => {
  const d = snap.val();
  if(!d || !d.team) return;
  if(d.correct && currentEpreuve) {
    // Révéler le titre après une bonne réponse
    showReveal(currentEpreuve, d.team);
  }
});

// ── TIMER ──
onValue(ref(db,'game/timer'), snap => {
  const d = snap.val();
  if(!d) return;
  if(d.running && d.start) {
    startTimer(d.start, d.duration);
  } else {
    stopTimer();
  }
});

function startTimer(startTs, durationSec) {
  stopTimer();
  const el = document.getElementById('timer-display');
  function tick() {
    const elapsed = Math.floor((Date.now() - startTs) / 1000);
    const remaining = Math.max(0, durationSec - elapsed);
    const m = Math.floor(remaining/60), s = remaining%60;
    el.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    el.className = 'timer-big' + (remaining < 30 ? ' danger' : remaining < 60 ? ' warn' : '');
    if(remaining === 0) stopTimer();
  }
  tick();
  timerInt = setInterval(tick, 500);
}

function stopTimer() {
  if(timerInt) { clearInterval(timerInt); timerInt = null; }
  const el = document.getElementById('timer-display');
  el.textContent = '00:00';
  el.className = 'timer-big';
}

// ── RENDUS ──
function showWaiting(msg) {
  const main = document.getElementById('main-zone');
  main.innerHTML = `
    <div class="waiting">
      <div class="waiting-logo">SÉMINAIRE</div>
      <div class="waiting-sub">${msg || 'En attente de la prochaine épreuve…'}</div>
    </div>`;
  renderPts();
}

function showBT(data) {
  const main = document.getElementById('main-zone');
  main.innerHTML = `
    <div class="bt-zone">
      <div class="bt-num">${data.label || ''} · Blind Test</div>
      <div class="bt-title bt-hidden" id="bt-titre">???</div>
      <div class="bt-artist" id="bt-artiste">Écoutez et buzzez !</div>
    </div>`;
  renderPts();
}

function showImage(data) {
  if(!data.fichier) { showWaiting('Image en cours de chargement…'); return; }
  const main = document.getElementById('main-zone');
  main.innerHTML = `
    <div class="image-zone" id="image-zone">
      <img src="${IMAGES_URL}${data.fichier}" alt="Image à identifier"
        onerror="this.style.display='none';document.getElementById('image-zone').innerHTML='<div style=color:var(--gris);font-size:1rem;>Image non trouvée</div>'">
    </div>`;
  if(revealTimeout) { clearTimeout(revealTimeout); revealTimeout = null; }
  renderPts();
}

// ── EMINEO — photos uploadées en temps réel ──
onValue(ref(db,'emineo/photos'), snap => {
  const d = snap.val();
  if(!d) return;
  if(currentEpreuve?.statut === 'emineo') renderEmineoPhotos(d);
});

function showEmineo() {
  const main = document.getElementById('main-zone');
  const lettres = ['E','M','I','N','O'];
  main.innerHTML = `
    <div class="emineo-zone" id="emineo-grid">
      <div class="emineo-header-empty"></div>
      ${lettres.map(l => `<div class="emineo-col-header">${l}</div>`).join('')}
      ${['G1','G2','G3'].map(g => `
        <div class="emineo-row-label">${g}</div>
        ${lettres.map(l => `<div class="emineo-cell empty" id="em-cell-${g}-${l}">·</div>`).join('')}
      `).join('')}
    </div>`;
  renderPts();
  get(ref(db,'emineo/photos')).then(snap => {
    if(snap.exists()) renderEmineoPhotos(snap.val());
  });
}

function renderEmineoPhotos(data) {
  const lettres = ['E','M','I','N','O'];
  ['G1','G2','G3'].forEach(g => {
    const gData = data[g] || {};
    lettres.forEach(l => {
      const cell = document.getElementById(`em-cell-${g}-${l}`);
      if(!cell) return;
      if(gData[l]) {
        cell.innerHTML = `<img src="${gData[l]}" alt="${l}">`;
        cell.classList.remove('empty');
      } else {
        cell.innerHTML = '·';
        cell.classList.add('empty');
      }
    });
  });
}

function showReveal(data, team) {
  const main = document.getElementById('main-zone');
  // Pour BT — révéler le titre
  if(data.statut === 'buzzer') {
    const titreEl = document.getElementById('bt-titre');
    if(titreEl) {
      titreEl.classList.remove('bt-hidden');
      const parts = (data.reponse_correcte || '').split(' par ');
      titreEl.textContent = parts[0] || '—';
      const artisteEl = document.getElementById('bt-artiste');
      if(artisteEl) artisteEl.textContent = parts[1] || '';
    }
    return;
  }
  // Pour image (Reconnaissance / Ciné) — image non floutée + overlay
  if(data.fichier) {
    const origFichier = data.fichier.replace('.jpg', '_orig.jpg');
    main.innerHTML = `
      <div class="image-zone" id="image-zone">
        <img src="${IMAGES_URL}${origFichier}" alt="${data.sujet||''}"
          onerror="this.src='${IMAGES_URL}${data.fichier}'">
        <div class="reveal-overlay">
          <div class="reveal-label">Bonne réponse · G${team}</div>
          <div class="reveal-title">${(data.reponse_correcte||'').split(' + ')[0]}</div>
          <div class="reveal-team">🏆 Équipe G${team}</div>
        </div>
      </div>`;
    return;
  }
  // Fallback overlay
  const overlay = document.createElement('div');
  overlay.className = 'reveal-overlay';
  const reponse = (data.reponse_correcte || '').split(' + ')[0];
  overlay.innerHTML = `
    <div class="reveal-label">Bonne réponse · G${team}</div>
    <div class="reveal-title">${reponse}</div>
    <div class="reveal-team">🏆 Équipe G${team}</div>`;
  main.appendChild(overlay);
}

</script>
</body>
</html>
